name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Floor (pyproject requires-python = ">=3.10") and a current release.
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      # The [dev] extra pulls pytest. No [login] extra: the smoke tests need
      # neither Playwright/Chromium nor network/cookies.
      - run: pip install -e ".[dev]"
      - run: pytest
